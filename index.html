<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #container {
            text-align: center;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            margin-bottom: 20px;
            font-size: 24px;
        }
        input[type="text"] {
            width: 80%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 18px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>הדפסת דף ברקודים</h1>
        <input type="text" id="dataInput" name="dataInput" placeholder="הכנס ברקוד">
        <button type="button" onclick="generatePDF()">הדפס</button>
    </div>
    <script>
        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const inputData = document.getElementById("dataInput").value;

            const pageWidth = 210;
            const pageHeight = 297;
            const marginX = 0;
            const marginY = 10;
            const numCols = 4;
            const numRows = 12;
            const labelWidth = (pageWidth - 2 * marginX) / numCols;
            const labelHeight = (pageHeight - 2 * marginY) / numRows;
            const innerMarginTop = 3; // 3 מ"מ רווח עליון בתוך המדבקה

            let x = marginX;
            let y = marginY;

            for (let i = 0; i < numRows; i++) {
                for (let j = 0; j < numCols; j++) {
                    const canvas = document.createElement("canvas");
                    JsBarcode(canvas, inputData, { format: "CODE128" });
                    const imgData = canvas.toDataURL("image/png");

                    pdf.addImage(imgData, 'PNG', x, y + innerMarginTop, labelWidth, labelHeight - innerMarginTop);
                    x += labelWidth;
                    if (x >= pageWidth - marginX) {
                        x = marginX;
                        y += labelHeight;
                    }
                }
            }

            pdf.save(inputData + '.pdf');
        }
    </script>
</body>
</html>
